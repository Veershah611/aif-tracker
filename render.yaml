services:
  - type: web
    name: aif-tracker
    env: python
    buildCommand: "pip install -r backend/requirements.txt && playwright install chromium --with-deps"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: PROXY_POOL
        sync: false
      - key: CRON_SECRET
        sync: false
