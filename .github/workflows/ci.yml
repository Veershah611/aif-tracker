name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff mypy pytest
        pip install -r requirements.txt
        
    - name: Run Ruff (Linter & Formatter Check)
      run: |
        ruff check .
        ruff format --check .
        
    - name: Run Mypy (Type Check)
      run: mypy .
      continue-on-error: true # Warning only for now since strict type hints might be missing
        
    - name: Run Pytest
      run: pytest tests/

  frontend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "18"
        
    - name: Install dependencies
      run: npm install
        
    - name: Run ESLint
      run: npm run lint
      
    - name: Build check
      run: npm run build
